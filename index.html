<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Spatial Update</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #0f0f0f; color: #e8e6e1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    #header {
      height: 52px; background: #111; border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; flex-shrink: 0; z-index: 10;
    }
    .site-name { font-size: 16px; font-weight: normal; letter-spacing: 0.07em; color: #f0ede8; text-transform: uppercase; }
    .site-name span { color: #e8c87a; }
    .site-tagline { font-size: 11px; color: #444; letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── Body ── */
    #body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px; flex-shrink: 0; background: #111;
      border-right: 1px solid #222; display: flex;
      flex-direction: column; overflow: hidden;
    }

    /* Search */
    .search-wrap { padding: 14px 16px; border-bottom: 1px solid #1e1e1e; }
    #search {
      width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 5px; padding: 7px 10px; font-size: 12px;
      color: #ccc; font-family: Arial, sans-serif; outline: none;
    }
    #search::placeholder { color: #444; }
    #search:focus { border-color: #3a3a3a; }

    /* Story count */
    .sidebar-meta {
      padding: 10px 16px 8px; display: flex;
      align-items: center; justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }
    .sidebar-count { font-size: 11px; color: #555; font-family: Arial, sans-serif; }
    .sidebar-count span { color: #e8c87a; }
    .no-results { padding: 20px 16px; font-size: 13px; color: #444; font-family: Arial, sans-serif; display: none; }

    /* Scrollable list */
    #story-list { overflow-y: auto; flex: 1; }
    #story-list::-webkit-scrollbar { width: 3px; }
    #story-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* Region group */
    .region-group { border-bottom: 1px solid #1a1a1a; }

    .region-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .region-header:hover { background: #161616; }

    .region-left { display: flex; align-items: center; gap: 8px; }
    .region-name { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.08em; font-family: Arial, sans-serif; }
    .region-count { font-size: 10px; color: #444; font-family: Arial, sans-serif; }

    .region-chevron {
      width: 0; height: 0; flex-shrink: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #444;
      transition: transform 0.2s;
    }
    .region-chevron.open { transform: rotate(180deg); }

    .region-stories { display: none; }
    .region-stories.open { display: block; }

    /* Story item */
    .story-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 16px 10px 24px;
      text-decoration: none; border-bottom: 1px solid #161616;
      transition: background 0.15s; cursor: pointer;
    }
    .story-item:last-child { border-bottom: none; }
    .story-item:hover { background: #161616; }
    .story-item.active { background: #161616; border-left: 2px solid #e8c87a; padding-left: 22px; }

    .item-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }

    .item-body { flex: 1; min-width: 0; }
    .item-title { font-size: 13px; color: #d8d5ce; line-height: 1.4; margin-bottom: 3px; }
    .item-meta { display: flex; align-items: center; gap: 5px; }
    .item-tag { font-size: 10px; color: #666; font-family: Arial, sans-serif; }
    .item-type {
      font-size: 9px; font-family: Arial, sans-serif; font-weight: 500;
      padding: 1px 5px; border-radius: 2px; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .type-news    { background: #2a1a08; color: #e8c87a; }
    .type-economy { background: #0a1e2e; color: #5b9bd5; }
    .type-geography { background: #0a201a; color: #3ecfb2; }
    .type-demographics { background: #1e0e14; color: #e05a4e; }
    .type-military  { background: #1e1010; color: #e05a4e; }

    /* Map */
    #map { flex: 1; height: 100%; }

    /* Popup */
    .mapboxgl-popup-content {
      background: #1a1a1a !important; border: 1px solid #2e2e2e;
      border-radius: 8px; padding: 0; font-family: Georgia, serif;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      min-width: 220px; max-width: 280px; overflow: hidden;
    }
    .mapboxgl-popup-close-button { color: #555; font-size: 18px; padding: 6px 10px; background: none; }
    .mapboxgl-popup-close-button:hover { color: #aaa; background: none; }
    .mapboxgl-popup-tip { border-top-color: #2e2e2e !important; }
    .popup-inner { padding: 16px 18px 18px; }
    .popup-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #e8c87a; margin-bottom: 7px; font-family: Arial, sans-serif; }
    .popup-title { font-size: 15px; line-height: 1.4; color: #f0ede8; margin-bottom: 10px; }
    .popup-desc { font-size: 12px; line-height: 1.65; color: #888; margin-bottom: 16px; font-family: Arial, sans-serif; }
    .popup-link {
      display: block; text-align: center; font-size: 12px; color: #0f0f0f;
      background: #e8c87a; padding: 9px 14px; border-radius: 4px;
      text-decoration: none; font-family: Arial, sans-serif; letter-spacing: 0.03em;
      transition: background 0.15s;
    }
    .popup-link:hover { background: #f0d88a; }
  </style>
</head>

<body>
  <div id="header">
    <div class="site-name">The Spatial <span>Update</span></div>
    <div class="site-tagline">Map-based current events</div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search stories..." autocomplete="off" />
      </div>
      <div class="sidebar-meta">
        <div class="sidebar-count" id="story-count"></div>
      </div>
      <div class="no-results" id="no-results">No stories match your search.</div>
      <div id="story-list"></div>
    </div>
    <div id="map"></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // YOUR MAPBOX TOKEN
    // ═══════════════════════════════════════════════════════════════
    mapboxgl.accessToken = 'pk.eyJ1IjoidGhlc3BhdGlhbHVwZGF0ZSIsImEiOiJjbW45dGkyaWcwY3dnMzFvZHBicncwZDduIn0.tUyw_YY97YD5SjGIyORPpA';


    // ═══════════════════════════════════════════════════════════════
    // STORIES LIST
    //
    // Each story now has a "region" and "type" property.
    //
    // region → groups stories in the sidebar (e.g. "Middle East")
    // type   → "news" | "economy" | "geography" | "demographics" | "military"
    //           controls the badge colour
    //
    // To add a new story: copy a block, fill in the details.
    // To add a new region: just use a new region name — it appears
    // in the sidebar automatically, alphabetically sorted.
    // ═══════════════════════════════════════════════════════════════
    const stories = [
      {
        region: "Middle East",
        coordinates: [53.0, 32.5],
        tag: "Iran · Military",
        type: "military",
        title: "Strikes on Iran: A Timeline of Escalation",
        description: "Mapping the progression of strikes across Iranian territory, month by month.",
        url: "./stories/iran-strikes/",
        color: "red"
      },
      {
        region: "Middle East",
        coordinates: [56.4, 26.6],
        tag: "Gulf · Economics",
        type: "economy",
        title: "The Strait of Hormuz: Oil's Most Critical Passage",
        description: "21 million barrels of oil transit this 3km-wide chokepoint every day. Here's what a closure would mean.",
        url: "./stories/strait-of-hormuz/",
        color: "gold"
      },

      {
        region: "Middle East",
        coordinates: [46.0, 28.0],
        tag: "Gulf · Geopolitics",
        type: "news",
        title: "Gulf State Relations: The Regional Power Balance",
        description: "How Iran, the Gulf states, and their proxies are aligned — and where US military power sits.",
        url: "./stories/gulf-state-relations/",
        color: "teal"
      },

      // ── ADD YOUR NEXT STORY HERE ─────────────────────────────
      // {
      //   region: "Middle East",
      //   coordinates: [50.5, 26.0],
      //   tag: "Gulf · Economics",
      //   type: "economy",
      //   title: "Gulf Oil Flows Since the War",
      //   description: "How Iranian conflict has reshuffled oil shipping routes.",
      //   url: "./stories/gulf-oil-flows/",
      //   color: "gold"
      // },
      // ─────────────────────────────────────────────────────────
    ];


    // ═══════════════════════════════════════════════════════════════
    // MARKER COLORS
    // ═══════════════════════════════════════════════════════════════
    const markerColors = {
      gold: '#e8c87a',
      red:  '#e05a4e',
      teal: '#3ecfb2',
      blue: '#5b9bd5',
    };

    const homeCenter = [20, 25];
    const homeZoom   = 2.2;


    // ═══════════════════════════════════════════════════════════════
    // MAP
    // ═══════════════════════════════════════════════════════════════
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: homeCenter,
      zoom: homeZoom,
      minZoom: 1.5,
      projection: 'globe',
      attributionControl: false
    });

    map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    map.on('style.load', () => {
      map.setFog({
        color: 'rgb(10, 10, 18)', 'high-color': 'rgb(20, 20, 40)',
        'horizon-blend': 0.04, 'space-color': 'rgb(5, 5, 10)', 'star-intensity': 0.35
      });

      const geojson = {
        type: 'FeatureCollection',
        features: stories.map((s, i) => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: s.coordinates },
          properties: { index: i, color: markerColors[s.color] || markerColors.gold }
        }))
      };

      map.addSource('stories', { type: 'geojson', data: geojson });

      map.addLayer({
        id: 'story-glow', type: 'circle', source: 'stories',
        paint: { 'circle-radius': 14, 'circle-color': ['get', 'color'], 'circle-opacity': 0.15, 'circle-stroke-width': 0 }
      });

      map.addLayer({
        id: 'story-dots', type: 'circle', source: 'stories',
        paint: {
          'circle-radius': 7, 'circle-color': ['get', 'color'],
          'circle-opacity': 0.9, 'circle-stroke-width': 1.5,
          'circle-stroke-color': 'rgba(255,255,255,0.12)'
        }
      });

      map.on('mouseenter', 'story-dots', () => {
        map.getCanvas().style.cursor = 'pointer';
        map.setPaintProperty('story-dots', 'circle-radius', 10);
        map.setPaintProperty('story-glow', 'circle-radius', 18);
        map.setPaintProperty('story-glow', 'circle-opacity', 0.22);
      });
      map.on('mouseleave', 'story-dots', () => {
        map.getCanvas().style.cursor = '';
        map.setPaintProperty('story-dots', 'circle-radius', 7);
        map.setPaintProperty('story-glow', 'circle-radius', 14);
        map.setPaintProperty('story-glow', 'circle-opacity', 0.15);
      });

      const popup = new mapboxgl.Popup({ closeButton: true, maxWidth: '300px', offset: 14 });

      map.on('click', 'story-dots', (e) => {
        const story = stories[e.features[0].properties.index];
        const coords = e.features[0].geometry.coordinates.slice();
        map.flyTo({ center: coords, zoom: 5, duration: 1000, essential: true });
        map.once('moveend', () => {
          popup.setLngLat(coords).setHTML(`
            <div class="popup-inner">
              <div class="popup-tag">${story.tag}</div>
              <div class="popup-title">${story.title}</div>
              <div class="popup-desc">${story.description}</div>
              <a class="popup-link" href="${story.url}">Open the full story →</a>
            </div>
          `).addTo(map);
        });
      });
    });


    // ═══════════════════════════════════════════════════════════════
    // BUILD SIDEBAR
    // Groups stories by region, builds collapsible sections,
    // wires up search filtering.
    // ═══════════════════════════════════════════════════════════════
    const storyList   = document.getElementById('story-list');
    const storyCount  = document.getElementById('story-count');
    const searchInput = document.getElementById('search');
    const noResults   = document.getElementById('no-results');

    // Group stories by region
    const regions = {};
    stories.forEach((story, i) => {
      if (!regions[story.region]) regions[story.region] = [];
      regions[story.region].push({ ...story, index: i });
    });

    // Sort regions alphabetically
    const sortedRegions = Object.keys(regions).sort();

    let flyBackTimer = null;

    function buildSidebar(filter = '') {
      storyList.innerHTML = '';
      const q = filter.toLowerCase().trim();
      let totalVisible = 0;

      sortedRegions.forEach(regionName => {
        const regionStories = regions[regionName].filter(s =>
          !q ||
          s.title.toLowerCase().includes(q) ||
          s.tag.toLowerCase().includes(q) ||
          s.type.toLowerCase().includes(q) ||
          s.region.toLowerCase().includes(q)
        );

        if (regionStories.length === 0) return;
        totalVisible += regionStories.length;

        const group = document.createElement('div');
        group.className = 'region-group';

        // Region header
        const header = document.createElement('div');
        header.className = 'region-header';
        header.innerHTML = `
          <div class="region-left">
            <span class="region-name">${regionName}</span>
            <span class="region-count">${regionStories.length}</span>
          </div>
          <div class="region-chevron open"></div>
        `;

        // Stories container
        const storiesEl = document.createElement('div');
        storiesEl.className = 'region-stories open';

        regionStories.forEach(story => {
          const color = markerColors[story.color] || markerColors.gold;
          const item = document.createElement('a');
          item.className = 'story-item';
          item.href = story.url;
          item.innerHTML = `
            <div class="item-dot" style="background:${color}"></div>
            <div class="item-body">
              <div class="item-title">${story.title}</div>
              <div class="item-meta">
                <span class="item-tag">${story.tag}</span>
                <span class="item-type type-${story.type}">${story.type}</span>
              </div>
            </div>
          `;

          item.addEventListener('mouseenter', () => {
            item.classList.add('active');
            if (flyBackTimer) clearTimeout(flyBackTimer);
            map.flyTo({ center: story.coordinates, zoom: 5, duration: 1200, essential: true });
          });

          item.addEventListener('mouseleave', () => {
            item.classList.remove('active');
            flyBackTimer = setTimeout(() => {
              map.flyTo({ center: homeCenter, zoom: homeZoom, duration: 1000, essential: true });
            }, 300);
          });

          storiesEl.appendChild(item);
        });

        // Toggle region open/closed on header click
        header.addEventListener('click', () => {
          const chevron = header.querySelector('.region-chevron');
          const isOpen = storiesEl.classList.contains('open');
          storiesEl.classList.toggle('open', !isOpen);
          chevron.classList.toggle('open', !isOpen);
        });

        group.appendChild(header);
        group.appendChild(storiesEl);
        storyList.appendChild(group);
      });

      // Update count and no-results message
      storyCount.innerHTML = `<span>${totalVisible}</span> stor${totalVisible !== 1 ? 'ies' : 'y'}${q ? ' found' : ' on the map'}`;
      noResults.style.display = totalVisible === 0 ? 'block' : 'none';
    }

    // Initial build
    buildSidebar();

    // Search — rebuild on every keystroke
    searchInput.addEventListener('input', (e) => {
      buildSidebar(e.target.value);
    });

  </script>
</body>
</html>
