<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoStory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #0f0f0f;
      color: #e8e6e1;
      padding: 60px 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      font-weight: normal;
      margin-bottom: 8px;
      color: #f0ede8;
    }
    .tagline {
      font-size: 15px;
      color: #666;
      margin-bottom: 48px;
    }
    .story-card {
      display: block;
      text-decoration: none;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 24px 28px;
      margin-bottom: 16px;
      background: #161616;
      transition: border-color 0.2s;
    }
    .story-card:hover { border-color: #e8c87a; }
    .story-tag {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #e8c87a;
      margin-bottom: 8px;
    }
    .story-title {
      font-size: 20px;
      color: #f0ede8;
      margin-bottom: 8px;
    }
    .story-desc {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h1>GeoStory</h1>
  <p class="tagline">Map-based current events and regional context.</p>

  <a class="story-card" href="./stories/iran-strikes/index.html">
    <div class="story-tag">Middle East · Military</div>
    <div class="story-title">Strikes on Iran: A Timeline of Escalation</div>
    <div class="story-desc">
      Mapping the progression of strikes across Iranian territory,
      with a month-by-month time slider.
    </div>
  </a>

  <!-- Add more story cards here as you build them. Copy the block above,
       change the href to ./stories/your-story-folder-name/index.html
       and update the tag, title, and description. -->

</body>
</html>
