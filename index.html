<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Spatial Update</title>

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #0f0f0f; color: #e8e6e1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ── */
    #header {
      height: 52px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      flex-shrink: 0;
      z-index: 10;
    }
    .site-name { font-size: 16px; font-weight: normal; letter-spacing: 0.07em; color: #f0ede8; text-transform: uppercase; }
    .site-name span { color: #e8c87a; }
    .site-tagline { font-size: 11px; color: #444; letter-spacing: 0.08em; text-transform: uppercase; }

    /* ── Body ── */
    #body { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px;
      flex-shrink: 0;
      background: #111;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-head { padding: 20px 22px 14px; border-bottom: 1px solid #1e1e1e; }
    .sidebar-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #555; margin-bottom: 4px; font-family: Arial, sans-serif; }
    .sidebar-count { font-size: 13px; color: #777; font-family: Arial, sans-serif; }
    .sidebar-count span { color: #e8c87a; font-weight: bold; }

    #story-list { overflow-y: auto; flex: 1; }
    #story-list::-webkit-scrollbar { width: 4px; }
    #story-list::-webkit-scrollbar-track { background: transparent; }
    #story-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .story-item {
      display: block;
      text-decoration: none;
      padding: 16px 22px;
      border-bottom: 1px solid #1a1a1a;
      transition: background 0.15s;
      cursor: pointer;
    }
    .story-item:hover { background: #161616; }
    .story-item.active { background: #161616; border-left: 2px solid #e8c87a; padding-left: 20px; }
    .item-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #e8c87a; margin-bottom: 5px; font-family: Arial, sans-serif; }
    .item-marker { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; margin-bottom: 2px; }
    .item-title { font-size: 14px; color: #e8e6e1; line-height: 1.4; margin-bottom: 5px; }
    .item-desc { font-size: 12px; color: #666; line-height: 1.5; font-family: Arial, sans-serif; }

    /* ── Map ── */
    #map { flex: 1; height: 100%; }
  </style>
</head>

<body>

  <div id="header">
    <div class="site-name">The Spatial <span>Update</span></div>
    <div class="site-tagline">Map-based current events</div>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-label">Stories</div>
        <div class="sidebar-count" id="story-count"></div>
      </div>
      <div id="story-list"></div>
    </div>
    <div id="map"></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // YOUR MAPBOX TOKEN
    // ═══════════════════════════════════════════════════════════════
    mapboxgl.accessToken = 'YOUR_MAPBOX_TOKEN_HERE';


    // ═══════════════════════════════════════════════════════════════
    // STORIES LIST — the only section you edit to add new stories
    //
    // coordinates → [longitude, latitude]
    // tag         → region · topic label
    // title       → headline
    // description → one sentence for the sidebar
    // url         → path to the story folder
    // color       → "gold", "red", "teal", or "blue"
    // ═══════════════════════════════════════════════════════════════
    const stories = [
      {
        coordinates: [53.0, 32.5],
        tag: "Middle East · Military",
        title: "Strikes on Iran: A Timeline of Escalation",
        description: "Mapping the progression of strikes across Iranian territory, month by month.",
        url: "./stories/iran-strikes/",
        color: "red"
      },

      // ── ADD YOUR NEXT STORY HERE ─────────────────────────────────
      // Copy the block above, paste below, and fill in the details.
      // ─────────────────────────────────────────────────────────────
    ];


    // ═══════════════════════════════════════════════════════════════
    // MARKER COLORS
    // Add new entries here if you want more color options.
    // ═══════════════════════════════════════════════════════════════
    const markerColors = {
      gold: '#e8c87a',
      red:  '#e05a4e',
      teal: '#3ecfb2',
      blue: '#5b9bd5',
    };


    // ═══════════════════════════════════════════════════════════════
    // MAP INITIALIZATION
    // ═══════════════════════════════════════════════════════════════
    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [20, 25],
      zoom: 2.2,
      minZoom: 1.5,
      projection: 'globe',
      attributionControl: false
    });

    map.addControl(new mapboxgl.AttributionControl({ compact: true }), 'bottom-right');
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Globe atmosphere
    map.on('style.load', () => {
      map.setFog({
        color: 'rgb(10, 10, 18)',
        'high-color': 'rgb(20, 20, 40)',
        'horizon-blend': 0.04,
        'space-color': 'rgb(5, 5, 10)',
        'star-intensity': 0.35
      });

      // ── Convert stories to GeoJSON and add as a map layer ──
      // This is the key fix: dots drawn by Mapbox stay locked to
      // the globe at all zoom levels, unlike HTML marker elements.

      const geojson = {
        type: 'FeatureCollection',
        features: stories.map((story, i) => ({
          type: 'Feature',
          geometry: {
            type: 'Point',
            coordinates: story.coordinates
          },
          properties: {
            index: i,
            title: story.title,
            url: story.url,
            color: markerColors[story.color] || markerColors.gold
          }
        }))
      };

      map.addSource('stories', {
        type: 'geojson',
        data: geojson
      });

      // Outer glow ring
      map.addLayer({
        id: 'story-glow',
        type: 'circle',
        source: 'stories',
        paint: {
          'circle-radius': 14,
          'circle-color': ['get', 'color'],
          'circle-opacity': 0.15,
          'circle-stroke-width': 0
        }
      });

      // Main dot
      map.addLayer({
        id: 'story-dots',
        type: 'circle',
        source: 'stories',
        paint: {
          'circle-radius': 7,
          'circle-color': ['get', 'color'],
          'circle-opacity': 0.9,
          'circle-stroke-width': 1.5,
          'circle-stroke-color': 'rgba(255,255,255,0.12)'
        }
      });

      // Pointer cursor on hover
      map.on('mouseenter', 'story-dots', () => {
        map.getCanvas().style.cursor = 'pointer';

        // Enlarge dot on hover
        map.setPaintProperty('story-dots', 'circle-radius', 10);
        map.setPaintProperty('story-glow', 'circle-radius', 18);
        map.setPaintProperty('story-glow', 'circle-opacity', 0.22);
      });

      map.on('mouseleave', 'story-dots', () => {
        map.getCanvas().style.cursor = '';

        // Restore dot size
        map.setPaintProperty('story-dots', 'circle-radius', 7);
        map.setPaintProperty('story-glow', 'circle-radius', 14);
        map.setPaintProperty('story-glow', 'circle-opacity', 0.15);
      });

      // Click → go directly to story
      map.on('click', 'story-dots', (e) => {
        const url = e.features[0].properties.url;
        window.location.href = url;
      });
    });


    // ═══════════════════════════════════════════════════════════════
    // BUILD SIDEBAR
    // ═══════════════════════════════════════════════════════════════
    const storyList = document.getElementById('story-list');
    const count = stories.length;
    document.getElementById('story-count').innerHTML =
      `<span>${count}</span> stor${count !== 1 ? 'ies' : 'y'} on the map`;

    stories.forEach((story) => {
      const color = markerColors[story.color] || markerColors.gold;

      const item = document.createElement('a');
      item.className = 'story-item';
      item.href = story.url;
      item.innerHTML = `
        <div class="item-tag">
          <span class="item-marker" style="background:${color}"></span>
          ${story.tag}
        </div>
        <div class="item-title">${story.title}</div>
        <div class="item-desc">${story.description}</div>
      `;

      // Hovering sidebar entry flies the globe to that location
      item.addEventListener('mouseenter', () => {
        item.classList.add('active');
        map.flyTo({
          center: story.coordinates,
          zoom: Math.max(map.getZoom(), 4),
          duration: 900,
          essential: true
        });
      });

      item.addEventListener('mouseleave', () => {
        item.classList.remove('active');
      });

      storyList.appendChild(item);
    });

  </script>
</body>
</html>
