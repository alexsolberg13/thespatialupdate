<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Interactive Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.0/mapbox-gl.js"></script>
    
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // 1. Replace this with your actual token from your Mapbox Account dashboard
    mapboxgl.accessToken = 'pk.eyJ1IjoidGhlc3BhdGlhbHVwZGF0ZSIsImEiOiJjbW45dGkyaWcwY3dnMzFvZHBicncwZDduIn0.tUyw_YY97YD5SjGIyORPpA';

    const map = new mapboxgl.Map({
        container: 'map', // ID of the div above
        style: 'mapbox://styles/thespatialupdate/cmn9ysoea003701sj25az3cx6', // You can change this to your custom Studio style later
        center: [53.6880, 32.4279], // Longitude first, then Latitude
        zoom: 5
    });

    // 2. Add some basic controls
    map.addControl(new mapboxgl.NavigationControl());
</script>

</body>
</html>
